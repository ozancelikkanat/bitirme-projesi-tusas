def normalize_risk_label(value: object) -> str:
    """Normalize display risk labels while keeping HIGH separate from CRITICAL."""

    if pd.isna(value):
        return "INCOMPLETE"
    text = str(value).strip().upper()
    if text in {"CRITICAL", "KRİTİK", "KRITIK"}:
        return "CRITICAL"
    if text in {"HIGH", "YÜKSEK"}:
        return "HIGH"
    if text in {"MEDIUM", "ORTA"}:
        return "MEDIUM"
    if text in {"LOW", "DÜŞÜK", "DUSUK"}:
        return "LOW"
    return "INCOMPLETE"
